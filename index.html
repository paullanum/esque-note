<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ecsql-note</title>
</head>

<body>
  <header id="navbar">
    <h1>Esque Note</h1>
  </header>
  <main id="content">
    <div id="sidebar">
      <h2>Notes</h2>
      <div>
        <button id="new_note_button">New Note</button>
        <button id="refresh">🔄️</button>
      </div>
      <div id="notes"></div>
      <div>
        <h2>Tags</h2>
        <button id="new_tag_button" commandfor="new_tag_dialog" command="show-modal">New Tag</button>
        <div id="tags"></div>
      </div>
      <div>
        <h2>Views</h2>
      </div>
      <div id="debug_console">
        <textarea id="sql_debug"></textarea>
        <button id="run_debug">Run</button>
      </div>
    </div>
    <div id="editor">
      <input type="text" id="note_title">
      <div id="note_tags_list">
        Tags:
        <div id="note_tags"></div>
        <details id="new_note_tag">
          <summary>Add...</summary>
          <ul id="unused_tags"></ul>
        </details>
      </div>
      <textarea id="note_body"></textarea>
      <button id="save_button">Save</button>
    </div>
  </main>
  <dialog id="new_tag_dialog">
    <h1>New Tag</h1>
    <h2>Data Types</h2>
    <input type="text" id="new_tag_name">
    <div id="new_tag_data_types"></div>
    <button id="add_tag_data_type">+</button>
    <button id="new_tag_accept">OK</button>
  </dialog>
  <dialog id="confirm_deletion">
    <h1>Are you sure you want to delete this note?</h1>
    <button id="confirm_deletion_button" commandfor="confirm_deletion" command="close">Delete</button>
  </dialog>
  <template id="new_tag_data_type_selection">
    <form class="new_tag_data_type_entry">
      <label>
        Name
        <input type="text" class="new_tag_type_name">
      </label>
      <label>
        Type
        <select class="new_tag_type_data">
          <option>String</option>
          <option>Int</option>
          <option>Float</option>
        </select>
      </label>
    </form>
  </template>
  <template id="tag_template">
    <div class="tag">
      <div id="tag_name" class="tag-name">
      </div>
      <div id="tag_value" class="tag-value">
      </div>
    </div>
  </template>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
